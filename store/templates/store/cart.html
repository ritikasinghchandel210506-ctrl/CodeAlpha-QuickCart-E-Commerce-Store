{% extends 'store/base.html' %}

{% block content %}
<h2>Cart</h2>

{% for product in products %}
<p>{{ product.name }} - ₹{{ product.price }}</p>
{% endfor %}

<a href="/checkout/">Checkout</a>

{% endblock %}

<style>
.cart-container{
    max-width:800px;
    margin:40px auto;
    padding:30px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.cart-title{
    text-align:center;
    color:#38bdf8;
    margin-bottom:25px;
    font-size:2rem;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:15px 20px;
    margin-bottom:15px;

    background:rgba(255,255,255,0.05);
    border-radius:12px;

    transition:0.3s;
}

.cart-item:hover{
    transform:translateX(5px);
    background:rgba(255,255,255,0.1);
}

.product-name{
    font-weight:500;
    color:white;
}

.product-price{
    color:#22c55e;
    font-weight:700;
    font-size:1.1rem;
}

.checkout-btn{
    display:block;
    width:220px;
    margin:30px auto 0;
    text-align:center;

    padding:14px 20px;

    background:#22c55e;
    color:white;
    text-decoration:none;

    border-radius:12px;
    font-weight:600;

    transition:0.3s;
}

.checkout-btn:hover{
    background:#16a34a;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(34,197,94,0.4);
}

.empty-cart{
    text-align:center;
    color:#cbd5e1;
    font-size:1.1rem;
    padding:20px;
}

@media(max-width:600px){

    .cart-item{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    .cart-title{
        font-size:1.7rem;
    }

    .checkout-btn{
        width:100%;
    }
}
</style>

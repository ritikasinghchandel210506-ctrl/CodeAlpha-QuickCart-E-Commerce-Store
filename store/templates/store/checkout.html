{% extends 'store/base.html' %}

{% block content %}

<div class="success-container">
    <div class="success-card">
        <div class="checkmark">✓</div>

        <h2>Order Placed Successfully!</h2>

        <p>
            Thank you for shopping with Quick Cart.
            Your order has been received and is being processed.
        </p>

        <a href="/" class="continue-btn">
            Continue Shopping
        </a>
    </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
}

/* Center Container */
.success-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
    padding:20px;
}

/* Success Card */
.success-card{
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:50px 40px;
    max-width:600px;
    width:100%;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* Checkmark */
.checkmark{
    width:100px;
    height:100px;
    margin:0 auto 25px;
    border-radius:50%;
    background:#22c55e;
    color:white;
    font-size:60px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 25px rgba(34,197,94,0.5);
}

/* Heading */
.success-card h2{
    color:#22c55e;
    font-size:2rem;
    margin-bottom:15px;
}

/* Description */
.success-card p{
    color:#e2e8f0;
    line-height:1.8;
    margin-bottom:30px;
    font-size:1rem;
}

/* Button */
.continue-btn{
    display:inline-block;
    padding:14px 28px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
}

.continue-btn:hover{
    background:#0284c7;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(56,189,248,0.4);
}

@media(max-width:600px){

    .success-card{
        padding:35px 25px;
    }

    .success-card h2{
        font-size:1.6rem;
    }

    .checkmark{
        width:80px;
        height:80px;
        font-size:50px;
    }
}
</style>

{% endblock %}

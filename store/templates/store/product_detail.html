{% extends 'store/base.html' %}

{% block content %}
<h2>{{ product.name }}</h2>

<p>{{ product.description }}</p>

<p>₹{{ product.price }}</p>

<img src="{{ product.image_url }}" width="150">

<button><a href="/add/{{ product.id }}/">Add to Cart</a></button>

{% endblock %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
    padding:40px;
}

/* Product Container */
.product-container{
    max-width:1000px;
    margin:auto;
    display:flex;
    gap:40px;
    align-items:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* Product Image */
.product-image img{
    width:350px;
    height:350px;
    object-fit:cover;
    border-radius:15px;
    transition:0.4s;
}

.product-image img:hover{
    transform:scale(1.05);
}

/* Product Details */
.product-info{
    flex:1;
}

.product-info h2{
    font-size:2.5rem;
    margin-bottom:15px;
    color:#38bdf8;
}

.product-info .description{
    font-size:1rem;
    line-height:1.8;
    color:#e2e8f0;
    margin-bottom:20px;
}

.product-info .price{
    font-size:2rem;
    font-weight:700;
    color:#22c55e;
    margin-bottom:25px;
}

/* Button */
.add-cart{
    display:inline-block;
    padding:14px 28px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
}

.add-cart:hover{
    background:#0284c7;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(56,189,248,0.4);
}

/* Responsive */
@media(max-width:768px){

    .product-container{
        flex-direction:column;
        text-align:center;
    }

    .product-image img{
        width:100%;
        max-width:320px;
        height:auto;
    }

    .product-info h2{
        font-size:2rem;
    }
}
</style>

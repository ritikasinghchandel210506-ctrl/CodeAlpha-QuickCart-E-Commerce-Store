{% extends 'store/base.html' %}

{% block content %}
<h2>Register</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button>Register</button>
</form>

{% endblock %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

/* Heading */
h2{
    text-align:center;
    color:#38bdf8;
    margin-bottom:25px;
    font-size:2rem;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* Form Card */
form{
    width:450px;
    max-width:100%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* Django form paragraphs */
form p{
    margin-bottom:18px;
}

/* Labels */
label{
    display:block;
    color:#e2e8f0;
    margin-bottom:8px;
    font-weight:500;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border:1px solid #38bdf8;
    box-shadow:0 0 12px rgba(56,189,248,0.5);
}

/* Register Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    background:#16a34a;
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(34,197,94,0.4);
}

/* Help text */
.helptext{
    display:block;
    color:#cbd5e1;
    font-size:12px;
    margin-top:5px;
}

/* Error Messages */
.errorlist{
    list-style:none;
    color:#ef4444;
    margin:5px 0;
    padding:0;
    font-size:14px;
}

/* Responsive */
@media(max-width:500px){

    form{
        padding:25px;
    }

    h2{
        font-size:1.7rem;
    }
}
</style>
